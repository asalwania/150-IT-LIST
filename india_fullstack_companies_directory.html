    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
    }

    .header {
      padding: 20px 16px 14px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      position: sticky;
      top: 0;
      background: var(--color-background-primary);
      z-index: 50;
    }

    .title {
      font-size: 17px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 2px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    input,
    select {
      padding: 7px 11px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 13px;
      font-family: var(--font-sans);
    }

    input {
      flex: 1 1 180px;
      min-width: 0;
    }

    select {
      cursor: pointer;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      padding: 16px;
    }

    .card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 13px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .card:hover {
      border-color: var(--color-border-secondary);
      background: var(--color-background-secondary);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: var(--border-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      font-size: 13px;
      flex-shrink: 0;
    }

    .cname {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ccity {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 1px;
    }

    .card-bottom {
      display: flex;
      gap: 5px;
      align-items: center;
      flex-wrap: wrap;
    }

    .apply {
      margin-left: auto;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-info);
    }

    .empty {
      text-align: center;
      color: var(--color-text-secondary);
      padding: 48px 16px;
      font-size: 14px;
    }
  </style>
</head>

    const tierStyle = {
      FAANG: { bg: "#B5D4F4", color: "#0C447C" },
      "Top MNC": { bg: "#AFA9EC", color: "#3C3489" },
      "IT Giant": { bg: "#CEC4F5", color: "#533AB7" },
      Unicorn: { bg: "#9FE1CB", color: "#085041" },
      Startup: { bg: "#FAC775", color: "#633806" },
    };

    const catColors = {};
    const palette = ["#B5D4F4", "#9FE1CB", "#FAC775", "#F5C4B3", "#F4C0D1", "#C0DD97", "#D3D1C7", "#CECBF6", "#9FE1CB", "#F0997B", "#85B7EB", "#5DCAA5", "#EF9F27", "#D85A30", "#D4537E", "#639922"];
    const allCats = [...new Set(companies.map(c => c.cat))].sort();
    allCats.forEach((c, i) => { catColors[c] = palette[i % palette.length]; });

    const catSel = document.getElementById("catFilter");
    ["All categories", ...allCats].forEach(c => {
      const o = document.createElement("option"); o.textContent = c; catSel.appendChild(o);
    });

    function initials(name) { return name.split(" ").slice(0, 2).map(w => w[0]).join("").toUpperCase(); }

    function render() {
      const q = document.getElementById("search").value.toLowerCase();
      const cat = catSel.value;
      const tier = document.getElementById("tierFilter").value;
      const sort = document.getElementById("sortSel").value;
      let list = companies.filter(c => {
        const ms = c.name.toLowerCase().includes(q) || c.city.toLowerCase().includes(q);
        const mc = cat === "All categories" || c.cat === cat;
        const mt = tier === "All tiers" || c.tier === tier;
        return ms && mc && mt;
      });
      if (sort === "name") list = [...list].sort((a, b) => a.name.localeCompare(b.name));
      document.getElementById("sub").textContent = `${list.length} of ${companies.length} companies · click any card to apply`;
      const grid = document.getElementById("grid");
      if (list.length === 0) { grid.innerHTML = '<div class="empty">No companies match your filters.</div>'; return; }
      grid.innerHTML = list.map(c => {
        const ts = tierStyle[c.tier] || { bg: "#D3D1C7", color: "#5F5E5A" };
        const avBg = catColors[c.cat] || "#D3D1C7";
        const avColor = "#444";
        return `<a class="card" href="${c.url}" target="_blank" rel="noopener noreferrer">
      <div class="card-top">
        <div class="avatar" style="background:${avBg}22;border:1px solid ${avBg}66;color:${avBg};filter:brightness(0.6) saturate(2)">${initials(c.name)}</div>
        <div style="min-width:0">
          <div class="cname">${c.name}</div>
          <div class="ccity">${c.city}</div>
        </div>
      </div>
      <div class="card-bottom">
        <span class="badge" style="background:${ts.bg};color:${ts.color}">${c.tier}</span>
        <span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">${c.cat}</span>
        <span class="apply">Apply →</span>
      </div>
    </a>`;
      }).join("");
    }

    document.getElementById("search").addEventListener("input", render);
    catSel.addEventListener("change", render);
    document.getElementById("tierFilter").addEventListener("change", render);
    document.getElementById("sortSel").addEventListener("change", render);
    render();
  </script>
